let current = 0, answers = new Array(questions.length).fill(null), correct = 0, wrong = 0;

function render() {
  const q = questions[current], n = current + 1;
  const pct = Math.round((n-1)/questions.length*100);
  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('progress-text').textContent = `Question ${n} / ${questions.length}`;
  document.getElementById('progress-pct').textContent = pct+'%';
  document.getElementById('q-num').textContent = `QUESTION ${String(n).padStart(2,'0')}`;
  document.getElementById('q-text').textContent = q.q;
  const illu = document.getElementById('q-illustration');
  if (q.img && C[q.img]) { illu.innerHTML = C[q.img]; illu.style.display = 'flex'; }
  else { illu.innerHTML = ''; illu.style.display = 'none'; }
  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${['A','B','C','D'][i]}</span>${opt}`;
    btn.disabled = answers[current] !== null;
    if (answers[current] !== null) {
      if (i === q.c) btn.classList.add('correct');
      else if (i === answers[current] && answers[current] !== q.c) btn.classList.add('wrong');
    }
    btn.addEventListener('click', () => selectAnswer(i));
    optDiv.appendChild(btn);
  });
  const exp = document.getElementById('explanation');
  exp.textContent = '💡 ' + q.e;
  exp.className = 'explanation' + (answers[current] !== null ? ' show' : '');
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  document.getElementById('sc-rem').textContent = questions.length - correct - wrong;
  document.getElementById('btn-prev').style.opacity = current === 0 ? '0.3' : '1';
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').textContent = current === questions.length-1 ? 'Voir résultats \u2192' : 'Suivante \u2192';
}

function selectAnswer(i) {
  if (answers[current] !== null) return;
  answers[current] = i;
  if (i === questions[current].c) correct++; else wrong++;
  render();
}

function nextQ() {
  if (current === questions.length-1) { showResult(); return; }
  current++; render();
}

function prevQ() { if (current > 0) { current--; render(); } }

function showResult() {
  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  const pct = Math.round(correct/questions.length*100);
  document.getElementById('res-score').textContent = `${correct}/${questions.length}`;
  document.getElementById('res-detail').textContent = `${pct}% de bonnes réponses — ${wrong} erreurs — ${questions.length-correct-wrong} sans réponse`;
  const m = pct>=90?'🏆 Excellent ! Maîtrise parfaite':pct>=75?'🎯 Très bien ! Quelques révisions suffisent':pct>=60?'📚 Bien — Continuez à réviser':pct>=50?'⚡ Moyen — Revoyez les notions clés':'🔄 Insuffisant — Reprenez les bases';
  document.getElementById('res-mention').textContent = m;
}

function restart() {
  current = 0; answers = new Array(questions.length).fill(null); correct = 0; wrong = 0;
  document.getElementById('quiz-section').style.display = 'block';
  document.getElementById('result-screen').style.display = 'none';
  render();
}

render();
</script>
